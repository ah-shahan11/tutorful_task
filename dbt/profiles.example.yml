tutorful_raw:
  outputs:
    dev:
      type: bigquery
      method: oauth
      project: "{{ env_var('DBT_GCP_PROJECT', 'tutorful-493614') }}"
      dataset: "{{ env_var('DBT_RAW_DATASET', 'tutorful_raw') }}"
      location: "{{ env_var('DBT_BQ_LOCATION', 'europe-west2') }}"
      threads: 1
      job_execution_timeout_seconds: 300
      job_retries: 1
      priority: interactive
  target: dev

